<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#261F1A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#8B1D1D"/>
    </marker>
    <style>
      .bg { fill: #FAF7F2; }
      .title { font: 700 34px Arial, sans-serif; fill: #261F1A; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #756B63; }
      .section-title { font: 700 18px Arial, sans-serif; fill: #261F1A; }
      .label { font: 600 14px Arial, sans-serif; fill: #261F1A; }
      .muted { font: 400 12px Arial, sans-serif; fill: #756B63; }
      .card { fill: #FFFFFF; stroke: #EFE6DD; stroke-width: 1.5; filter: url(#shadow); }
      .accent { fill: #8B1D1D; }
      .line { stroke: #8B1D1D; stroke-width: 3; marker-end: url(#arrow); }
      .soft-line { stroke: #D6A84A; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .chip { fill: #FFF7F1; stroke: #E8D6C9; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="28" class="bg"/>

  <text x="640" y="58" text-anchor="middle" class="title">Mai Am Gia Dinh Viet - System Architecture</text>
  <text x="640" y="88" text-anchor="middle" class="subtitle">A simple overview of the main technologies used across the mobile app, backend, data, AI, and delivery layers.</text>

  <!-- Mobile App -->
  <rect x="60" y="170" width="270" height="260" rx="24" class="card"/>
  <rect x="60" y="170" width="270" height="7" rx="3.5" class="accent"/>
  <text x="195" y="213" text-anchor="middle" class="section-title">Mobile App</text>
  <text x="195" y="237" text-anchor="middle" class="muted">Expo React Native client</text>

  <image href="https://cdn.simpleicons.org/expo/000020" x="98" y="268" width="54" height="54"/>
  <image href="https://cdn.simpleicons.org/react/61DAFB" x="180" y="268" width="54" height="54"/>
  <image href="https://cdn.simpleicons.org/typescript/3178C6" x="98" y="342" width="54" height="54"/>
  <image href="https://cdn.simpleicons.org/tailwindcss/38BDF8" x="180" y="342" width="54" height="54"/>

  <text x="125" y="335" text-anchor="middle" class="label">Expo</text>
  <text x="207" y="335" text-anchor="middle" class="label">React Native</text>
  <text x="125" y="409" text-anchor="middle" class="label">TypeScript</text>
  <text x="207" y="409" text-anchor="middle" class="label">NativeWind</text>

  <!-- Backend -->
  <rect x="505" y="160" width="270" height="280" rx="24" class="card"/>
  <rect x="505" y="160" width="270" height="7" rx="3.5" fill="#009688"/>
  <text x="640" y="203" text-anchor="middle" class="section-title">Backend API</text>
  <text x="640" y="227" text-anchor="middle" class="muted">REST API, auth, admin, content</text>

  <image href="https://cdn.simpleicons.org/fastapi/009688" x="548" y="265" width="60" height="60"/>
  <image href="https://cdn.simpleicons.org/python/3776AB" x="672" y="265" width="60" height="60"/>
  <image href="https://cdn.simpleicons.org/jsonwebtokens/000000" x="610" y="345" width="60" height="60"/>

  <text x="578" y="338" text-anchor="middle" class="label">FastAPI</text>
  <text x="702" y="338" text-anchor="middle" class="label">Python</text>
  <text x="640" y="418" text-anchor="middle" class="label">JWT Auth</text>

  <!-- Database -->
  <rect x="950" y="175" width="270" height="250" rx="24" class="card"/>
  <rect x="950" y="175" width="270" height="7" rx="3.5" fill="#1F8B4C"/>
  <text x="1085" y="218" text-anchor="middle" class="section-title">Data Layer</text>
  <text x="1085" y="242" text-anchor="middle" class="muted">Persistent application data</text>

  <image href="https://cdn.simpleicons.org/postgresql/4169E1" x="1027" y="278" width="70" height="70"/>
  <image href="https://cdn.simpleicons.org/pandas/150458" x="1078" y="352" width="54" height="54"/>

  <text x="1062" y="365" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="1105" y="419" text-anchor="middle" class="label">CSV Import</text>

  <!-- AI Services -->
  <rect x="505" y="520" width="270" height="160" rx="24" class="card"/>
  <rect x="505" y="520" width="270" height="7" rx="3.5" fill="#D6A84A"/>
  <text x="640" y="562" text-anchor="middle" class="section-title">AI Assistant</text>
  <text x="640" y="586" text-anchor="middle" class="muted">Ask & Find chatbot and embeddings</text>

  <image href="https://cdn.simpleicons.org/googlegemini/8E75B2" x="610" y="608" width="62" height="62"/>
  <text x="641" y="686" text-anchor="middle" class="label">Google Gemini</text>

  <!-- External Auth -->
  <rect x="60" y="520" width="270" height="160" rx="24" class="card"/>
  <rect x="60" y="520" width="270" height="7" rx="3.5" fill="#4285F4"/>
  <text x="195" y="562" text-anchor="middle" class="section-title">Identity</text>
  <text x="195" y="586" text-anchor="middle" class="muted">Third-party sign-in provider</text>

  <image href="https://cdn.simpleicons.org/google/4285F4" x="164" y="608" width="62" height="62"/>
  <text x="195" y="686" text-anchor="middle" class="label">Google Sign-In</text>

  <!-- Delivery -->
  <rect x="950" y="520" width="270" height="160" rx="24" class="card"/>
  <rect x="950" y="520" width="270" height="7" rx="3.5" fill="#7C3AED"/>
  <text x="1085" y="562" text-anchor="middle" class="section-title">Build & Delivery</text>
  <text x="1085" y="586" text-anchor="middle" class="muted">Development and release workflow</text>

  <image href="https://cdn.simpleicons.org/expo/000020" x="1008" y="614" width="50" height="50"/>
  <image href="https://cdn.simpleicons.org/android/3DDC84" x="1082" y="614" width="50" height="50"/>
  <image href="https://cdn.simpleicons.org/apple/000000" x="1153" y="614" width="50" height="50"/>

  <text x="1033" y="681" text-anchor="middle" class="label">EAS</text>
  <text x="1107" y="681" text-anchor="middle" class="label">Android</text>
  <text x="1178" y="681" text-anchor="middle" class="label">iOS</text>

  <!-- Main arrows -->
  <path d="M330 300H505" class="line"/>
  <text x="417" y="286" text-anchor="middle" class="muted">REST JSON API</text>

  <path d="M775 300H950" class="line"/>
  <text x="862" y="286" text-anchor="middle" class="muted">SQLModel</text>

  <path d="M195 520V430" class="soft-line"/>
  <text x="290" y="477" text-anchor="middle" class="muted">OAuth token</text>

  <path d="M505 600H330" class="soft-line"/>
  <text x="417" y="588" text-anchor="middle" class="muted">Google auth</text>

  <path d="M640 520V440" class="soft-line"/>
  <text x="704" y="488" text-anchor="middle" class="muted">AI answers</text>

  <path d="M775 600H950" class="soft-line"/>
  <text x="862" y="588" text-anchor="middle" class="muted">build app</text>

  <path d="M1085 520V425" class="soft-line"/>
  <text x="1162" y="482" text-anchor="middle" class="muted">seed data</text>

  <!-- Legend -->
  <rect x="60" y="112" width="1160" height="36" rx="18" class="chip"/>
  <text x="640" y="135" text-anchor="middle" class="muted">Main flow: Mobile App -> FastAPI Backend -> PostgreSQL. Supporting services: Google Sign-In, Google Gemini, CSV import, and EAS builds.</text>
</svg>
